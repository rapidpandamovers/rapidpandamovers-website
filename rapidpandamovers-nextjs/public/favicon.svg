<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Orange circle background -->
  <circle cx="16" cy="16" r="16" fill="#f97316"/>

  <!-- Panda head (simplified for small size) -->
  <!-- White face -->
  <circle cx="16" cy="16" r="9" fill="#ffffff"/>

  <!-- Black ears -->
  <circle cx="10" cy="10" r="3.5" fill="#000000"/>
  <circle cx="22" cy="10" r="3.5" fill="#000000"/>

  <!-- Black eye patches -->
  <ellipse cx="13" cy="15" rx="2" ry="2.5" fill="#000000"/>
  <ellipse cx="19" cy="15" rx="2" ry="2.5" fill="#000000"/>

  <!-- White eyes -->
  <circle cx="13" cy="15" r="1" fill="#ffffff"/>
  <circle cx="19" cy="15" r="1" fill="#ffffff"/>

  <!-- Black nose -->
  <ellipse cx="16" cy="19" rx="1.5" ry="1" fill="#000000"/>

  <!-- Moving box at bottom (simplified) -->
  <rect x="11" y="23" width="10" height="6" fill="#000000" rx="0.5"/>
  <line x1="11" y1="26" x2="21" y2="26" stroke="#f97316" stroke-width="0.5"/>
  <line x1="16" y1="23" x2="16" y2="29" stroke="#f97316" stroke-width="0.5"/>
</svg>
